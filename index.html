<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>31225 黃鈺舜 - 科技應用專題作品集</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #76b5c5;
            --accent: #ffb7b2;
            --bg-soft: #f8fbff;
        }
        body {
            font-family: 'Quicksand', 'Noto Sans TC', sans-serif;
            background-color: var(--bg-soft);
            overflow: hidden; /* 防止主視窗捲動，交由內部容器 */
        }
        /* 故事感進場 */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }
        .intro-text {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary);
            letter-spacing: 5px;
        }

        /* 佈局設定 */
        .app-container {
            display: grid;
            grid-template-areas: 
                "header header"
                "sidebar main";
            grid-template-columns: 280px 1fr;
            grid-template-rows: 80px 1fr;
            height: 100vh;
        }

        header { grid-area: header; }
        aside { grid-area: sidebar; }
        main { grid-area: main; }

        /* 選單樣式 */
        .menu-item {
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .menu-item:hover {
            background: rgba(118, 181, 197, 0.1);
            transform: translateX(10px);
        }
        .menu-item.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(118, 181, 197, 0.3);
        }
