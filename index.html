<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>31225 黃鈺舜 - 科技應用專題作品集</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
            overflow: hidden;
        }

        /* 1. 自動進場動畫遮罩 */
        #auto-intro {
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1);
        }

        .intro-line {
            width: 0;
            height: 2px;
            background: #0ea5e9;
            animation: lineExpand 1s forwards;
        }

        @keyframes lineExpand {
            to { width: 200px; }
        }

        /* 2. 佈局架構 */
        .grid-layout {
            display: grid;
            grid-template-areas: 
                "header header"
                "sidebar main";
            grid-template-columns: 260px 1fr;
            grid-template-rows: 70px 1fr;
            height: 100vh;
        }

        /* 3. 動畫與互動 */
        .section-content {
            display: none;
            animation: fadeInUp 0.8s ease;
        }
        .section-content.active { display: block; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-link {
            transition: all 0.3s ease;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .nav-link:hover { background: #f1f5f9; padding-left: 1.5rem; }
        .nav-link.active { background: #0ea5e9; color: white; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3); }
